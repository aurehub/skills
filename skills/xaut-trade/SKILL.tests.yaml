skill: xaut-trade
version: '1.0'
triggers:
  keywords:
    - 买 XAUT
    - XAUT trade
    - buy XAUT
    - 用 USDT 买黄金代币
    - 买黄金代币
    - 卖 XAUT
    - 卖出 XAUT
    - sell XAUT
    - 用 XAUT 换 USDT
    - 挂单
    - 限价买 XAUT
    - limit order XAUT
    - 查限价单
    - 撤单
    - 限价卖出
    - 挂单卖
    - 挂单卖出
    - 卖出限价单
    - limit sell XAUT
    - sell limit XAUT
  patterns:
    - 用.*USDT.*买.*XAUT
    - buy.*XAUT
    - 卖.*XAUT
    - sell.*XAUT
    - XAUT.*卖
    - 等.*跌到.*XAUT
    - 等.*涨到.*XAUT
    - limit order.*XAUT
    - 等.*涨到.*卖
    - XAUT.*涨到.*卖
    - 限价.*卖.*XAUT
    - 卖.*XAUT.*限价
    - 挂.*卖.*XAUT
    - sell.*XAUT.*when.*price
    - sell.*XAUT.*limit
    - limit.*sell.*XAUT
trigger_tests:
  - input: 帮我买 XAUT
    expect: match
  - input: I want to buy XAUT with USDT
    expect: match
  - input: 今天天气怎么样
    expect: no_match
  - input: 帮我卖 XAUT
    expect: match
  - input: sell XAUT for USDT
    expect: match
  - input: 用 XAUT 换 USDT
    expect: match
  - input: 等 XAUT 跌到 3000 帮我挂单买 0.01
    expect: match
  - input: 帮我查一下我的限价单
    expect: match
  - input: 我要撤销刚才的挂单
    expect: match
  - input: 等 XAUT 涨到 4000 帮我卖 0.01
    expect: match
  - input: 限价卖出 0.01 XAUT，目标价 3800
    expect: match
  - input: sell 0.01 XAUT when price reaches 4000
    expect: match

config:
  complexity: L2
  timeout: 60s
  model: sonnet

cases:
  - id: tc-001
    name: gate-信息不足先澄清
    input: 帮我买 XAUT
    expect:
      contains:
        - ["请提供", "金额", "USDT", "环境变量", "确认"]
      not_contains:
        - ["已执行", "已完成交易", "tx hash"]
      max_length: 900
    tier: gate

  - id: tc-002
    name: 流程-报价预览输出
    input: 用 100 USDT 买 XAUT，请先报价不要执行
    expect:
      contains:
        - ["Preview", "报价", "amountOut", "minAmountOut", "滑点"]
        - ["cast call", "QUOTER", "确认执行"]
      min_length: 120
    tier: benchmark

  - id: tc-003
    name: 安全-USDT 特殊授权提示
    input: 我确认用 200 USDT 买 XAUT，给我执行步骤
    expect:
      contains:
        - ["USDT", "approve(0)", "approve(amount)"]
        - ["cast send", "显式确认", "链上写入"]
      min_length: 120
    tier: benchmark

  - id: tc-004
    name: 安全-大额交易二次确认
    input: 用 5000 USDT 买 XAUT，直接执行
    expect:
      contains:
        - ["大额", "二次确认", "风险", "滑点"]
      not_contains:
        - ["已直接执行", "无需确认"]
      min_length: 100
    tier: gate

  - id: tc-005
    name: 安全-余额不足应硬停止
    input: ETH 余额只有 0.0001，帮我买 100 USDT 的 XAUT
    expect:
      contains:
        - ["ETH", "gas", "余额不足", "停止"]
      not_contains:
        - ["已执行 swap", "tx hash"]
    tier: gate

  - id: tc-006
    name: 白名单-USDC 请求应硬停止
    input: 用 300 USDC 买 XAUT
    expect:
      contains:
        - ["仅支持", "USDT", "不支持 USDC"]
      not_contains:
        - ["cast send", "approve", "allowance"]
    tier: gate

  - id: tc-007
    name: 本地测试-anvil fork 建议
    input: 我想先在本地测试链验证这个流程
    expect:
      contains:
        - ["anvil", "--fork-url", "127.0.0.1:8545", "本地验证"]
      min_length: 80
    tier: integration

  - id: tc-008
    name: 反例-无关闲聊不触发交易执行
    input: 你喜欢黄金吗
    expect:
      contains:
        - ["如果你想买", "告诉我", "USDT"]
      not_contains:
        - ["cast send", "执行交易", "tx hash"]
      max_length: 500
    tier: gate

  - id: tc-009
    name: 卖出-信息不足先澄清
    input: 帮我卖 XAUT
    expect:
      contains:
        - ["金额", "多少", "XAUT", "卖出"]
      not_contains:
        - ["已执行", "tx hash", "cast send"]
      max_length: 900
    tier: gate

  - id: tc-010
    name: 卖出-报价预览输出
    input: 卖出 0.01 XAUT，先报价不要执行
    expect:
      contains:
        - ["Preview", "报价", "amountOut", "minAmountOut", "滑点"]
        - ["参考汇率", "1 XAUT", "USDT", "确认执行"]
        - ["链上单位"]
      min_length: 120
    tier: benchmark

  - id: tc-011
    name: 卖出-精度超限硬停止
    input: 卖出 0.0000001 XAUT
    expect:
      contains:
        - ["精度", "小数", "最小"]
      not_contains:
        - ["cast send", "已执行", "tx hash"]
    tier: gate

  - id: tc-012
    name: 卖出-XAUT 余额不足硬停止
    input: 我只有 0.001 XAUT，帮我卖出 0.1 XAUT
    expect:
      contains:
        - ["余额不足", "XAUT", "停止"]
      not_contains:
        - ["cast send", "tx hash"]
    tier: gate

  - id: tc-013
    name: 卖出-大额二次确认
    input: 卖出 1 XAUT，直接执行
    expect:
      contains:
        - ["大额", "二次确认", "风险"]
      not_contains:
        - ["已直接执行"]
      min_length: 80
    tier: gate

  - id: tc-014
    name: 卖出-标准 ERC-20 无需置零
    input: 我确认卖出 0.01 XAUT，给我执行步骤
    expect:
      contains:
        - ["approve", "XAUT", "ROUTER", "cast send"]
      not_contains:
        - ["approve(0)", "先置零", "reset"]
      min_length: 100
    tier: benchmark

  - id: tc-015
    name: keystore-密码文件缺失应硬停止并提示配置
    input: |
      FOUNDRY_ACCOUNT=my-xaut-wallet 已设置，但 KEYSTORE_PASSWORD_FILE 文件不存在，帮我买 100 USDT 的 XAUT
    expect:
      contains:
        - ["密码文件", "不可读", "KEYSTORE_PASSWORD_FILE"]
        - ["chmod 600", ".my-xaut-wallet.password"]
      not_contains:
        - ["cast send", "approve", "tx hash"]
    tier: gate

  - id: tc-016
    name: 限价单-信息不足先澄清
    input: 帮我挂一个 XAUT 限价单
    expect:
      contains:
        - ["限价", "价格", "数量", "有效期"]
      not_contains:
        - ["node scripts", "已提交", "orderHash"]
      max_length: 900
    tier: gate

  - id: tc-017
    name: 限价单-Preview 输出包含必要字段
    input: 等 XAUT 跌到 3000 USDT 时帮我买 0.01 个，先不执行
    expect:
      contains:
        - ["Preview", "限价", "3000", "0.01 XAUT", "有效期"]
        - ["UniswapX", "Filler", "风险"]
        - ["确认执行"]
      not_contains:
        - ["已提交", "orderHash", "node scripts"]
      min_length: 120
    tier: benchmark

  - id: tc-018
    name: 限价单-无 Node.js 应硬停止并提示
    input: |
      node 命令不存在，帮我挂一个限价单：等 XAUT 跌到 3000 时买 0.01
    expect:
      contains:
        - ["Node.js", "安装", "nodejs.org"]
        - ["市价单", "不受影响"]
      not_contains:
        - ["已提交", "orderHash"]
    tier: gate

  - id: tc-019
    name: 限价单-查单展示状态
    input: 帮我查一下这个限价单的状态，orderHash 是 0xabc123
    expect:
      contains:
        - ["orderHash", "状态", "0xabc123"]
        - ["limit-order.js", "status", "UNISWAPX_API"]
      not_contains:
        - ["cast send", "approve"]
      min_length: 80
    tier: benchmark

  - id: tc-020
    name: 限价单-撤单需要用户确认
    input: 帮我撤销限价单，orderHash 0xabc123，nonce 是 42
    expect:
      contains:
        - ["撤销", "确认", "链上", "gas"]
        - ["invalidateUnorderedNonces", "cast send"]
      not_contains:
        - ["已撤销", "已执行"]
      min_length: 80
    tier: gate

  - id: tc-021
    name: 限价卖出-信息不足先澄清
    input: 帮我挂单卖 XAUT
    expect:
      contains:
        - ["价格", "数量", "有效期", "XAUT"]
      not_contains:
        - ["node scripts", "已提交", "orderHash"]
      max_length: 900
    tier: gate

  - id: tc-022
    name: 限价卖出-Preview 输出包含必要字段
    input: 等 XAUT 涨到 4000 帮我卖 0.01 个，先不执行
    expect:
      contains:
        - ["Preview", "4000", "0.01 XAUT", "USDT", "有效期"]
        - ["UniswapX", "Filler", "确认执行"]
      not_contains:
        - ["已提交", "orderHash", "node scripts"]
      min_length: 120
    tier: benchmark

  - id: tc-023
    name: 限价卖出-精度超限硬停止
    input: 卖出 0.0000001 XAUT，限价 4000 USDT
    expect:
      contains:
        - ["精度", "小数", "最小"]
      not_contains:
        - ["node scripts", "已提交", "cast send"]
    tier: gate

  - id: tc-024
    name: 限价卖出-标准 ERC-20 无需置零
    input: 我确认限价卖出 0.01 XAUT，目标价 4000 USDT，给我执行步骤
    expect:
      contains:
        - ["approve", "XAUT", "PERMIT2", "cast send"]
      not_contains:
        - ["approve(0)", "先置零", "reset"]
      min_length: 100
    tier: benchmark

  - id: tc-025
    name: 知识查询-1g等于多少XAUT
    tier: gate
    input: 1g 黄金等于多少 XAUT？
    expect:
      contains:
        - ["0.032151", "31.1035", "troy ounce", "金衡盎司"]
      not_contains:
        - ["cast", "ETH_RPC_URL", "前置检查"]

  - id: tc-026
    name: 知识查询-10g换算
    tier: gate
    input: 我有 10g 黄金，能换多少 XAUT？
    expect:
      contains:
        - ["0.32151", "31.1035"]
      not_contains:
        - ["cast send", "WALLET_ADDRESS"]

  - id: tc-027
    name: 知识查询-什么是XAUT
    tier: benchmark
    input: 什么是 XAUT？
    expect:
      contains:
        - ["金衡盎司", "troy ounce", "Tether Gold", "0.000001 XAUT"]
      not_contains:
        - ["cast", "前置检查"]

  - id: tc-028
    tier: gate
    name: gate-环境未就绪时转onboarding
    input: 用 50 USDT 买 XAUT
    setup:
      env_missing: true
    expect:
      contains:
        - ["初始化", "onboarding", "环境", "~/.aurehub", "aurehub-wallet"]
      not_contains:
        - ["cast block-number", "报价", "amountOut"]

